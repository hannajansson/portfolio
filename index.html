<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hanna Jansson — Designer & Product Manager</title>
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,700,800&display=swap"
    />
    <script>
      // Restore path encoded by 404.html redirect
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var q = new URLSearchParams(window.location.search).get('q');
          window.history.replaceState(
            null, '',
            '/portfolio' + decodeURIComponent(p) + (q ? '?' + decodeURIComponent(q) : '') + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </body>
</html>
